# Local development.
# Brings up the app + Postgres on a private network.
# Postgres is bound to 127.0.0.1 only — never to a public address.
# For production, use docker-compose.prod.yml.
#
# Most developers run only the database in Docker (`docker compose up -d db`)
# and run Next.js on the host (`npm run dev`). The `app` service is for
# fully-Dockerized dev. Either way:
#
#   1. Copy .env.example → .env (Compose's default) for the `app` service.
#   2. .env.local is loaded automatically by Next.js when running on the host.
#
# The `app` service uses `env_file: .env` so the file does not need to be
# exported into your shell. If .env is missing, only the `app` service
# fails — the `db` service still runs.

services:
  db:
    image: postgres:16-alpine
    container_name: rpd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpdops
      POSTGRES_PASSWORD: rpdops_dev_pw
      POSTGRES_DB: rpdops
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Dev convenience: expose to localhost only so you can use Prisma Studio.
    # Remove this in any non-dev environment.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpdops -d rpdops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  app:
    profiles: [full]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpd-app
    restart: unless-stopped
    # Loaded at compose-up time. .env is the Compose default; it's not
    # committed (see .gitignore). Copy from .env.example.
    # `required: false` (Compose v2.24+) lets `docker compose up -d db`
    # validate this file even when .env is absent.
    env_file:
      - path: .env
        required: false
    environment:
      # These take precedence over env_file values for the same keys.
      NODE_ENV: development
      DATABASE_URL: postgresql://rpdops:rpdops_dev_pw@db:5432/rpdops?schema=public
      NEXTAUTH_URL: http://localhost:3000
      SESSION_IDLE_MS: "1800000"
      SESSION_ABSOLUTE_MS: "43200000"
      RATE_LIMIT_AUTH_PER_MIN: "10"
      LOG_LEVEL: debug
      TRUST_PROXY: "0"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
