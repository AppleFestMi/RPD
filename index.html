<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RPD Internal Ops · Demo</title>
  <meta name="description" content="Richmond Police Department · Internal Ops portal demo (mock data only)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
/* RPD Internal Ops — design tokens + global styles
   Municipal/public-safety palette: navy, slate, white, muted blue accents. */

:root {
  /* Brand */
  --rpd-navy: #0f1d33;
  --rpd-navy-2: #14253f;
  --rpd-navy-3: #1b3052;
  --rpd-ink: #0b1626;

  /* Surfaces */
  --bg: #f4f6fa;
  --surface: #ffffff;
  --surface-2: #fafbfd;
  --line: #e3e7ee;
  --line-2: #ecf0f5;

  /* Text */
  --text: #11243f;
  --text-2: #45556c;
  --text-3: #6b7a91;
  --text-4: #94a0b3;

  /* Accents */
  --accent: #2f6fd6;        /* muted municipal blue */
  --accent-soft: #e6efff;
  --accent-ink: #1d4f9c;

  /* Status */
  --ok: #1f7a4d;
  --ok-soft: #e3f3ea;
  --warn: #b06b1a;
  --warn-soft: #fbeed4;
  --danger: #b3261e;
  --danger-soft: #fae3e0;
  --info: #2f6fd6;
  --info-soft: #e6efff;
  --pending: #6b54b8;
  --pending-soft: #ece6fb;
  --neutral: #5a6a82;
  --neutral-soft: #eef1f6;

  /* Radii / shadow */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
  --shadow-1: 0 1px 0 rgba(15,29,51,.04), 0 1px 2px rgba(15,29,51,.06);
  --shadow-2: 0 1px 0 rgba(15,29,51,.04), 0 6px 18px rgba(15,29,51,.08);

  --sidebar-w: 232px;
  --header-h: 56px;

  --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 var(--font-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── App layout ─────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}
.app.compact { --sidebar-w: 64px; }

/* Sidebar */
.sb {
  background: var(--rpd-navy);
  color: #c8d3e3;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #0b1626;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sb-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  color: #fff;
}
.sb-brand .shield {
  width: 32px;
  height: 36px;
  flex: 0 0 auto;
}
.sb-brand .wm {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}
.sb-brand .wm .t1 {
  font-weight: 700;
  letter-spacing: .04em;
  font-size: 13px;
}
.sb-brand .wm .t2 {
  color: #8ea2bf;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
}

.sb-section {
  padding: 10px 14px 4px;
  font-size: 10.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #6e83a3;
}
.sb-nav {
  list-style: none;
  margin: 0;
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sb-nav li button {
  appearance: none;
  border: 0;
  background: transparent;
  color: #c4d0e2;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
}
.sb-nav li button:hover {
  background: rgba(255,255,255,.05);
  color: #fff;
}
.sb-nav li:hover .pin-btn { opacity: 1 !important; }
.sb-nav li .pin-btn:hover { color: #ffd166 !important; }
.sb-nav li.active button {
  background: rgba(255,255,255,.08);
  color: #fff;
  box-shadow: inset 2px 0 0 var(--accent);
}
.sb-nav li button .ic { width: 18px; height: 18px; flex: 0 0 auto; opacity: .9; }
.sb-nav li button .badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.sb-foot {
  margin-top: auto;
  padding: 12px 14px;
  border-top: 1px solid rgba(255,255,255,.06);
  font-size: 11px;
  color: #7d92b1;
  line-height: 1.45;
}

/* Main */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.hdr {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 22px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.hdr .crumb {
  font-size: 13px;
  color: var(--text-3);
}
.hdr .crumb b {
  color: var(--text);
  font-weight: 600;
}
.hdr .spacer { flex: 1; }
.hdr .search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 6px 10px;
  width: 280px;
  color: var(--text-3);
  font-size: 13px;
}
.hdr .search input {
  border: 0;
  background: transparent;
  outline: none;
  flex: 1;
  font: inherit;
  color: var(--text);
}
.hdr .role {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 4px 4px 4px 10px;
  font-size: 12.5px;
  color: var(--text-2);
}
.hdr .role select {
  appearance: none;
  border: 0;
  background: var(--surface);
  border-radius: 6px;
  padding: 4px 22px 4px 8px;
  font: inherit;
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-3) 50%), linear-gradient(135deg, var(--text-3) 50%, transparent 50%);
  background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}
.hdr .me {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 12px;
  border-left: 1px solid var(--line);
}
.hdr .me .av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--rpd-navy);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 11px;
  font-weight: 600;
}
.hdr .me .nm {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
  font-size: 12.5px;
}
.hdr .me .nm small {
  color: var(--text-3);
  font-size: 11px;
}

.content {
  padding: 22px;
  flex: 1;
  min-width: 0;
}
.page-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.page-head h1 {
  margin: 0 0 2px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.01em;
}
.page-head p {
  margin: 0;
  color: var(--text-3);
  font-size: 13px;
}
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.footer-note {
  border-top: 1px solid var(--line);
  background: var(--surface);
  padding: 14px 22px;
  color: var(--text-3);
  font-size: 11.5px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.footer-note .boundary {
  max-width: 720px;
}
.footer-note b {
  color: var(--text-2);
  font-weight: 600;
}

/* ─── Atoms ──────────────────────────────────────────────── */

.btn {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  transition: background .12s, border-color .12s;
}
.btn:hover { background: var(--surface-2); border-color: #d4dae4; }
.btn .ic { width: 15px; height: 15px; }
.btn-primary {
  background: var(--rpd-navy);
  border-color: var(--rpd-navy);
  color: #fff;
}
.btn-primary:hover { background: var(--rpd-navy-2); border-color: var(--rpd-navy-2); }
.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-accent:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
  background: var(--surface);
}
.btn-danger:hover { background: var(--danger-soft); }
.btn-sm { padding: 4px 9px; font-size: 12px; }
.btn-icon { padding: 6px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--neutral-soft);
  color: var(--neutral);
  white-space: nowrap;
  line-height: 1.5;
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chip-ok { background: var(--ok-soft); color: var(--ok); }
.chip-warn { background: var(--warn-soft); color: var(--warn); }
.chip-danger { background: var(--danger-soft); color: var(--danger); }
.chip-info { background: var(--info-soft); color: var(--info); }
.chip-pending { background: var(--pending-soft); color: var(--pending); }
.chip-outline { background: transparent; border: 1px solid var(--line); color: var(--text-2); }
.chip-solid {
  background: var(--rpd-navy);
  color: #fff;
}

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
}
.card-head {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid var(--line-2);
}
.card-head h3 {
  margin: 0;
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -.005em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-head .meta { color: var(--text-3); font-size: 12px; }
.card-body { padding: 14px 16px; }
.card-foot {
  padding: 10px 16px;
  border-top: 1px solid var(--line-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text-3);
}

.kpi {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kpi .label { font-size: 11.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; }
.kpi .val { font-size: 24px; font-weight: 700; letter-spacing: -.01em; font-family: var(--font-mono); }
.kpi .sub { font-size: 12px; color: var(--text-3); }

.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-2-1 { grid-template-columns: 2fr 1fr; }
.grid-1-2 { grid-template-columns: 1fr 2fr; }
@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .grid-2-1, .grid-1-2 { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .app { grid-template-columns: 1fr; }
  .sb { display: none; }
  .hdr .search { display: none; }
}

/* Tables */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  font-weight: 600;
  color: var(--text-3);
  font-size: 11.5px;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}
.tbl td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--line-2);
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: 0; }
.tbl tr.row-hover:hover td { background: var(--surface-2); }
.tbl .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* Forms */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 500; color: var(--text-2); }
.field .hint { font-size: 11.5px; color: var(--text-3); }
.input, .select, .textarea {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: 8px;
  padding: 8px 10px;
  font: inherit;
  color: var(--text);
  outline: none;
  width: 100%;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(47,111,214,.15);
}
.textarea { min-height: 80px; resize: vertical; }
.fieldset {
  display: grid;
  gap: 12px;
  grid-template-columns: 1fr 1fr;
}
@media (max-width: 720px) { .fieldset { grid-template-columns: 1fr; } }

/* List rows */
.lst { display: flex; flex-direction: column; }
.lst-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line-2);
}
.lst-row:last-child { border-bottom: 0; }
.lst-row .ic-wrap {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--surface-2);
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  color: var(--text-2);
}
.lst-row .grow { flex: 1; min-width: 0; }
.lst-row .t1 { font-weight: 500; font-size: 13.5px; }
.lst-row .t2 { color: var(--text-3); font-size: 12px; }

/* Avatars */
.av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--rpd-navy);
  color: #fff;
  display: inline-grid;
  place-items: center;
  font-size: 10.5px;
  font-weight: 600;
  flex: 0 0 auto;
  letter-spacing: .02em;
}
.av-sm { width: 22px; height: 22px; font-size: 9.5px; }
.av-lg { width: 40px; height: 40px; font-size: 13px; }
.av-blue { background: #2f6fd6; }
.av-slate { background: #4a5a73; }
.av-green { background: #2f7a4d; }
.av-amber { background: #b06b1a; }
.av-violet { background: #6b54b8; }

/* Toast */
.toaster {
  position: fixed;
  right: 22px;
  bottom: 22px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
}
.toast {
  background: #0e2541;
  color: #fff;
  border: 1px solid rgba(255,255,255,.08);
  padding: 10px 14px;
  border-radius: 10px;
  box-shadow: var(--shadow-2);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 240px;
  animation: toast-in .25s ease both;
}
.toast .ok-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ad08a; }
.toast .info-dot { background: #6ea6ff; }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Modal */
.modal-back {
  position: fixed;
  inset: 0;
  background: rgba(11,22,38,.45);
  z-index: 90;
  display: grid;
  place-items: center;
  padding: 22px;
  animation: m-in .15s ease both;
}
@keyframes m-in { from { opacity: 0 } to { opacity: 1 } }
.modal {
  background: var(--surface);
  border-radius: 14px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 30px 60px rgba(0,0,0,.25);
  overflow: hidden;
  max-height: calc(100vh - 60px);
  display: flex;
  flex-direction: column;
}
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { margin: 0; font-size: 15px; }
.modal-body { padding: 16px 18px; overflow: auto; }
.modal-foot { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; gap: 8px; justify-content: flex-end; }

/* Schedule grid */
.sched {
  display: grid;
  grid-template-columns: 84px repeat(7, minmax(0, 1fr));
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.sched-h {
  font-size: 11.5px;
  color: var(--text-3);
  padding: 10px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 600;
}
.sched-h .dnum { display: block; font-size: 16px; color: var(--text); font-weight: 700; letter-spacing: 0; text-transform: none; margin-top: 2px; }
.sched-h.today .dnum { color: var(--accent); }
.sched-row-h {
  background: var(--surface-2);
  border-bottom: 1px solid var(--line-2);
  border-right: 1px solid var(--line-2);
  font-size: 11.5px;
  color: var(--text-3);
  padding: 10px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.sched-cell {
  border-bottom: 1px solid var(--line-2);
  border-right: 1px solid var(--line-2);
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 84px;
}
.sched-cell:nth-child(8n) { border-right: 0; }
.sched-cell.today { background: rgba(47,111,214,.04); }

.shift-pill {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 6px 8px;
  border-radius: 7px;
  font-size: 11.5px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-left: 3px solid var(--accent);
  cursor: pointer;
  line-height: 1.3;
}
.shift-pill .who { font-weight: 600; font-size: 11.5px; color: inherit; }
.shift-pill .tm { font-family: var(--font-mono); font-size: 10.5px; opacity: .85; }
.shift-pill.t-patrol-d { background: #e8f0fb; color: #1d4f9c; border-left-color: #2f6fd6; }
.shift-pill.t-patrol-n { background: #1b3052; color: #cfe0ff; border-left-color: #6ea6ff; }
.shift-pill.t-reserve { background: #ece6fb; color: #4d3a99; border-left-color: #6b54b8; }
.shift-pill.t-train { background: #e3f3ea; color: #1f7a4d; border-left-color: #2f7a4d; }
.shift-pill.t-event { background: #fbeed4; color: #8a4f0e; border-left-color: #b06b1a; }
.shift-pill.t-court { background: #eef1f6; color: #45556c; border-left-color: #5a6a82; }
.shift-pill.t-cmd { background: #fae3e0; color: #7a1814; border-left-color: #b3261e; }
.shift-pill.t-dispatch { background: #fff4e0; color: #7a4a0e; border-left-color: #d18a2a; }
.shift-pill.is-open {
  background: repeating-linear-gradient(135deg, #ffffff 0 6px, #f4f6fa 6px 10px);
  border: 1px dashed #b9c4d6;
  border-left: 3px dashed #5a6a82;
  color: var(--text-2);
}

/* Reserve clock */
.clock-card {
  background: linear-gradient(180deg, #14253f 0%, #0f1d33 100%);
  color: #fff;
  border-radius: var(--r-lg);
  padding: 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.clock-card .now {
  font-family: var(--font-mono);
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -.01em;
}
.clock-card .label { color: #8ea2bf; font-size: 11.5px; text-transform: uppercase; letter-spacing: .08em; }
.clock-card .status-row { display: flex; align-items: center; gap: 8px; }
.clock-card .pulse { width: 8px; height: 8px; border-radius: 50%; background: #4ad08a; box-shadow: 0 0 0 4px rgba(74,208,138,.18); }
.clock-card .pulse.off { background: #6e83a3; box-shadow: none; }

/* Hours bars */
.bar {
  position: relative;
  background: var(--line-2);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
}
.bar > span {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--accent);
  border-radius: 6px;
}
.bar.bar-cert > span { background: #2f6fd6; }
.bar.bar-parks > span { background: #2f7a4d; }
.bar.bar-event > span { background: #b06b1a; }

/* Specialty tags */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  background: var(--neutral-soft);
  color: var(--neutral);
}
.tag.fto { background: #e6efff; color: #1d4f9c; }
.tag.firearms { background: #fae3e0; color: #7a1814; }
.tag.evt { background: #fbeed4; color: #8a4f0e; }
.tag.reserve { background: #ece6fb; color: #4d3a99; }
.tag.bike { background: #e3f3ea; color: #1f7a4d; }
.tag.atv { background: #fbeed4; color: #8a4f0e; }
.tag.k9 { background: #eef1f6; color: #45556c; }
.tag.fto-ev { background: #e6efff; color: #1d4f9c; }

/* Subnav / tabs */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 16px;
  overflow-x: auto;
}
.tabs button {
  appearance: none;
  border: 0;
  background: transparent;
  padding: 9px 14px;
  font: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
}
.tabs button:hover { color: var(--text); }
.tabs button.on { color: var(--text); border-bottom-color: var(--rpd-navy); }
.tabs .count {
  display: inline-block;
  margin-left: 6px;
  background: var(--neutral-soft);
  color: var(--text-3);
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 600;
  padding: 1px 6px;
}
.tabs button.on .count { background: var(--accent-soft); color: var(--accent-ink); }

/* Availability grid */
.avail {
  display: grid;
  grid-template-columns: 96px repeat(7, minmax(0, 1fr));
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
  background: var(--surface);
}
.avail .h {
  background: var(--surface-2);
  font-size: 11.5px;
  text-align: center;
  padding: 8px 4px;
  color: var(--text-3);
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line-2);
}
.avail .h:last-child { border-right: 0; }
.avail .row-l {
  background: var(--surface-2);
  font-size: 11.5px;
  padding: 10px;
  color: var(--text-2);
  font-weight: 600;
  border-right: 1px solid var(--line-2);
  border-bottom: 1px solid var(--line-2);
  display: flex;
  align-items: center;
}
.avail .cell {
  border-right: 1px solid var(--line-2);
  border-bottom: 1px solid var(--line-2);
  padding: 6px;
  cursor: pointer;
  font-size: 11px;
  text-align: center;
  color: var(--text-3);
  user-select: none;
}
.avail .cell:last-child { border-right: 0; }
.avail .cell.av-yes { background: #e3f3ea; color: #1f7a4d; font-weight: 600; }
.avail .cell.av-no { background: #fae3e0; color: #7a1814; font-weight: 600; }
.avail .cell.av-pref { background: #2f6fd6; color: #fff; font-weight: 600; }

/* Empty state */
.empty {
  padding: 22px;
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  border: 1px dashed var(--line);
  border-radius: var(--r-md);
  background: var(--surface-2);
}

/* Vehicle card */
.veh {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--surface);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: var(--shadow-1);
}
.veh .top { display: flex; justify-content: space-between; align-items: center; }
.veh .unit {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -.01em;
}
.veh .meta { font-size: 12px; color: var(--text-3); }
.veh .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
.veh .stats .l { color: var(--text-3); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
.veh .stats .v { font-family: var(--font-mono); font-weight: 600; }

/* Misc */
.divider { height: 1px; background: var(--line); margin: 14px 0; }
.muted { color: var(--text-3); }
.mono { font-family: var(--font-mono); }
.hr-text {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-3);
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin: 12px 0 8px;
}
.hr-text::before, .hr-text::after { content: ''; flex: 1; height: 1px; background: var(--line); }

.help-banner {
  background: linear-gradient(180deg, #14253f, #0f1d33);
  color: #cfdcef;
  border-radius: var(--r-lg);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.help-banner .ic { color: #6ea6ff; }
.help-banner b { color: #fff; }

.print-only { display: none; }

/* ─── TV / Briefing-room display ─────────────────────────── */
.tv {
  position: fixed;
  inset: 0;
  background: #0b1626;
  color: #fff;
  display: flex;
  flex-direction: column;
  z-index: 200;
  font-family: var(--font-sans);
}
.tv-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 36px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.tv-hd .brand { display: flex; align-items: center; gap: 14px; }
.tv-hd .t1 { font-size: 22px; font-weight: 700; letter-spacing: .04em; }
.tv-hd .t2 { font-size: 13px; color: #8ea2bf; letter-spacing: .12em; text-transform: uppercase; }
.tv-clock { font-family: var(--font-mono); font-size: 56px; font-weight: 600; letter-spacing: -.02em; line-height: 1; }
.tv-date { font-size: 14px; color: #8ea2bf; text-align: right; margin-top: 4px; }
.tv-body { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; padding: 28px 36px; flex: 1; min-height: 0; }
.tv-col { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
.tv-section h2 { margin: 0 0 14px; font-size: 14px; color: #6ea6ff; letter-spacing: .14em; text-transform: uppercase; font-weight: 700; }
.tv-shift {
  display: grid;
  grid-template-columns: 200px 1fr 180px;
  gap: 16px;
  padding: 14px 18px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  border-radius: 10px;
  align-items: center;
}
.tv-shift .lbl { font-size: 16px; font-weight: 700; color: #cfdcef; letter-spacing: .02em; }
.tv-shift .lbl small { display: block; font-size: 12px; color: #6ea6ff; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; margin-top: 2px;}
.tv-shift .nm { font-size: 22px; font-weight: 600; }
.tv-shift .tm { font-family: var(--font-mono); font-size: 18px; color: #8ea2bf; text-align: right; }
.tv-banner {
  background: linear-gradient(90deg, rgba(110,166,255,.18), rgba(110,166,255,.04));
  border: 1px solid rgba(110,166,255,.3);
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 16px;
}
.tv-banner b { color: #6ea6ff; }
.tv-list { display: flex; flex-direction: column; gap: 10px; }
.tv-list-item {
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  border-radius: 8px;
  font-size: 15px;
}
.tv-list-item .ttl { font-weight: 600; margin-bottom: 2px; }
.tv-list-item .sub { color: #8ea2bf; font-size: 13px; }
.tv-foot {
  padding: 14px 36px;
  border-top: 1px solid rgba(255,255,255,.1);
  font-size: 13px;
  color: #6e83a3;
  display: flex;
  justify-content: space-between;
}
.tv-exit {
  position: absolute;
  top: 22px;
  right: 36px;
  /* hidden — keyboard escape only */
}

/* Hide scroll on tabs nicely */
.tabs::-webkit-scrollbar { height: 0; }

/* ── Demo build overrides ─────────────────────────────────────────── */

/* Sidebar must scroll when groups + pinned exceed viewport. */
.sb { overflow-y: auto; overscroll-behavior: contain; }
.sb::-webkit-scrollbar { width: 8px; }
.sb::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }
.sb::-webkit-scrollbar-track { background: transparent; }

/* Pinned item unpin button (always visible, gold) */
.sb-nav .unpin-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: 0;
  cursor: pointer;
  color: #ffd166;
  padding: 2px;
  display: flex;
  opacity: .85;
}
.sb-nav .unpin-btn:hover { opacity: 1; color: #ffe08a; }
.sb-nav li.has-unpin button { padding-right: 28px; }

/* Mobile nav: hamburger + slide-in */
.hdr .menu-btn {
  display: none;
  appearance: none;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: 8px;
  padding: 6px 8px;
  cursor: pointer;
  color: var(--text-2);
}
.hdr .menu-btn:hover { background: var(--surface-2); }
.sb-scrim { display: none; }

@media (max-width: 720px) {
  .hdr .menu-btn { display: inline-flex; align-items: center; }
  .app { grid-template-columns: 1fr; }
  .sb {
    display: flex !important;
    position: fixed;
    top: 0; left: 0;
    width: 280px; max-width: 86vw;
    height: 100vh;
    z-index: 80;
    transform: translateX(-100%);
    transition: transform .22s ease;
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .app.nav-open .sb { transform: translateX(0); }
  .app.nav-open .sb-scrim {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(11,22,38,.45);
    z-index: 70;
    animation: m-in .15s ease both;
  }
  .hdr .crumb { font-size: 12px; }
  .footer-note { font-size: 10.5px; flex-direction: column; gap: 8px; }
}

/* Command palette backdrop — original code uses a class with no CSS rules. */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(11,22,38,.45);
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px;
  animation: m-in .15s ease both;
}

/* Header search styled as a button that opens the command palette */
.hdr .search { cursor: pointer; transition: border-color .12s, background .12s; }
.hdr .search:hover { border-color: #cdd5e1; background: var(--surface); }
.hdr .search input { pointer-events: none; cursor: pointer; }
.hdr .search kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-3);
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 1px 5px;
  border-radius: 4px;
  margin-left: 4px;
}

/* ── Demo PIN gate ────────────────────────────────────────────── */
.pin-gate {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background:
    radial-gradient(1100px 600px at 30% 20%, rgba(110,166,255,.10), transparent 60%),
    radial-gradient(900px 500px at 80% 90%, rgba(47,111,214,.12), transparent 65%),
    linear-gradient(180deg, #0b1626, #0f1d33 60%, #0a1424);
  color: #cfdcef;
  z-index: 1000;
  padding: 22px;
}
.pin-card {
  background: rgba(20,37,63,.92);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  padding: 32px 28px 22px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter: blur(10px);
}
.pin-card h1 {
  margin: 0 0 6px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: .02em;
  color: #fff;
}
.pin-card .sub {
  margin: 0 0 18px;
  font-size: 13px;
  color: #8ea2bf;
}
.pin-card input {
  width: 100%;
  padding: 12px 14px;
  font: 600 18px/1 var(--font-mono);
  letter-spacing: .35em;
  text-align: center;
  background: rgba(11,22,38,.7);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 10px;
  color: #fff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.pin-card input::placeholder { color: #4a5d7a; letter-spacing: .35em; }
.pin-card input:focus {
  border-color: #6ea6ff;
  box-shadow: 0 0 0 3px rgba(110,166,255,.18);
}
.pin-err {
  color: #ff8a80;
  font-size: 12px;
  margin-top: 8px;
  font-weight: 500;
}
.pin-foot {
  margin: 18px 0 0;
  font-size: 11px;
  color: #6e83a3;
  line-height: 1.5;
}
@keyframes pin-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.pin-card.shake { animation: pin-shake .42s ease both; }
.pin-card.shake input { border-color: #ff8a80; box-shadow: 0 0 0 3px rgba(255,138,128,.18); }

  // pseudo-random but deterministic — seed from numeric portion of id
  const n = parseInt(r.id.slice(1), 10) || (i + 1);
  const seed = (n * 7 + i * 13) % 100;
  const cert = 30 + ((seed * 3) % 110);
  const parks = 10 + ((seed * 5) % 80);
  const events = 8 + ((seed * 2) % 60);
  return { id: r.id, name: r.name, badge: r.badge, certified: cert, parks, events, cert: cert, event: events, total: cert + parks + events };
}).sort((a,b) => b.total - a.total);

  const seed = parseInt(String(r.id).replace(/\D/g, ''), 10) || (i + 1);
  const meet = Math.min(4, ((seed * 3) % 5));
  const shifts = ((seed * 2) % 8) + 2;
  const trainings = ((seed * 5) % 4);
  const events = ((seed * 7) % 4);
  const total = meet * 2 + shifts * 1 + trainings * 3 + events * 4;
  return { id: r.id, name: r.name, badge: r.badge, meetings: meet, meetReq: 4, shifts, trainings, events, total };
}).sort((a, b) => b.total - a.total);

  const arr = [];
  const start = new Date();
  start.setDate(1);
  const days = new Date(start.getFullYear(), start.getMonth()+1, 0).getDate();
  for (let i = 0; i < days; i++) {
    const d = new Date(start.getFullYear(), start.getMonth(), i+1);
    const dow = d.getDay();
    // Weekdays: alternate by date odd/even. Weekends: full 24h, alternate weeks.
    const who = dow === 0 || dow === 6 ? (Math.floor(i/7) % 2) : (i % 2);
    arr.push({ date: d, who });
  }
  return arr;
})();

/* // ── Shared atoms ──────────────────────────────────────── */
// Shared UI atoms used across screens.

const { useState, useEffect, useRef, useMemo } = React;

// Toast bus
const ToastCtx = React.createContext({ push: () => {} });
function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const push = (msg, kind = "ok") => {
    const id = Math.random().toString(36).slice(2);
    setItems(s => [...s, { id, msg, kind }]);
    setTimeout(() => setItems(s => s.filter(i => i.id !== id)), 2800);
  };
  return (
    <ToastCtx.Provider value={{ push }}>
      {children}
      <div className="toaster">
        {items.map(t => (
          <div key={t.id} className="toast">
            <span className={"ok-dot " + (t.kind === "info" ? "info-dot" : "")}></span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => React.useContext(ToastCtx).push;

// Modal
function Modal({ open, onClose, title, children, footer, width }) {
  if (!open) return null;
  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal" style={width ? { maxWidth: width } : null} onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h3>{title}</h3>
          <button className="btn btn-ghost btn-icon" onClick={onClose} aria-label="Close">
            <Icons.X size={16} />
          </button>
        </div>
        <div className="modal-body">{children}</div>
        {footer ? <div className="modal-foot">{footer}</div> : null}
      </div>
    </div>
  );
}

// Card
function Card({ title, action, meta, children, foot, className = "", icon }) {
  return (
    <div className={"card " + className}>
      {(title || action) && (
        <div className="card-head">
          <h3>{icon}{title}</h3>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            {meta ? <span className="meta">{meta}</span> : null}
            {action}
          </div>
        </div>
      )}
      <div className="card-body">{children}</div>
      {foot ? <div className="card-foot">{foot}</div> : null}
    </div>
  );
}

// KPI
function Kpi({ label, val, sub, icon }) {
  return (
    <div className="card">
      <div className="card-body" style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
        <div className="kpi">
          <span className="label">{label}</span>
          <span className="val">{val}</span>
          {sub ? <span className="sub">{sub}</span> : null}
        </div>
        {icon ? <div style={{width:34, height:34, borderRadius:8, background:'var(--surface-2)', display:'grid', placeItems:'center', color:'var(--text-3)'}}>{icon}</div> : null}
      </div>
    </div>
  );
}

// Avatar
function Avatar({ person, size }) {
  const cls = "av " + (size === "sm" ? "av-sm " : size === "lg" ? "av-lg " : "") + (person.color || "");
  return <span className={cls} title={person.name}>{initials(person.name)}</span>;
}

// Chip
function Chip({ kind, children, dot }) {
  const cls = kind ? "chip chip-" + kind : "chip";
  return <span className={cls}>{dot ? <span className="dot"/> : null}{children}</span>;
}

function StatusChip({ status }) {
  const c = statusChip(status);
  return <span className={"chip " + c.cls}>{c.label}</span>;
}

// Tabs
function Tabs({ tabs, value, onChange }) {
  return (
    <div className="tabs">
      {tabs.map(t => (
        <button key={t.id} className={value === t.id ? "on" : ""} onClick={() => onChange(t.id)}>
          {t.label}{t.count != null ? <span className="count">{t.count}</span> : null}
        </button>
      ))}
    </div>
  );
}

// SectionHead
function PageHead({ title, sub, actions }) {
  return (
    <div className="page-head">
      <div>
        <h1>{title}</h1>
        {sub ? <p>{sub}</p> : null}
      </div>
      {actions ? <div className="page-actions">{actions}</div> : null}
    </div>
  );
}

// ── Daily Activity Reports ───────────────────────────────────

  const [tab, setTab] = useState(me ? "mine" : "all");
  const list = tab === "mine" ? DAR_LOG.filter(d => d.officer === "Walker") : DAR_LOG;

  const totals = list.reduce((acc, d) => ({
    stops: acc.stops + d.stops, citations: acc.citations + d.citations,
    arrests: acc.arrests + d.arrests, miles: acc.miles + d.miles, calls: acc.calls + d.calls,

  return (

// Special Events: rich list, builder, and confidential briefing template.

function SpecialEventsV2({ role }) {
  const toast = useToast();
  const isSup = role === "Supervisor" || role === "Command Staff" || role === "Admin";
  const [activeId, setActiveId] = useState(null);

  const [creating, setCreating] = useState(false);

  if (briefingId) {
    return <BriefingView id={briefingId} onBack={() => setBriefingId(null)}/>;
  }

    return <EventDetail id={activeId} role={role} onBack={() => setActiveId(null)} onOpenBriefing={setBriefingId}/>;
  }

  return (
    <>
      <PageHead
        title="Special Events"
        sub="Plan, staff, brief. Build multi-day events with multiple briefings, post assignments, mutual aid, and confidential operations packets."

      />

      <div className="grid grid-3" style={{marginBottom:16}}>
        <Kpi label="Active / planning" val={String(SE_EVENTS.filter(e => e.status !== "Closed").length)} sub="" icon={<Icons.Star size={18}/>}/>
        <Kpi label="Confidential briefings" val={String(Object.values(SE_BRIEFINGS).filter(b => b.classification?.startsWith("Confidential")).length)} sub="LE-sensitive" icon={<Icons.Lock size={18}/>}/>
        <Kpi label="Mutual aid agencies" val={String(new Set(SE_EVENTS.flatMap(e => e.mutualAid.map(m => m.agency))).size)} sub="committed across events" icon={<Icons.Users size={18}/>}/>
      </div>

      <div className="grid grid-2">
        {SE_EVENTS.map(e => (
          <div className="card" key={e.id}>
            <div className="card-body" style={{display:'flex', flexDirection:'column', gap:10}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10}}>
                <div>
                  <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
                    {e.classification?.startsWith("Confidential") && <ClassChip text="CONFIDENTIAL"/>}
                    <Chip kind={e.status === "Confirmed" || e.status === "Active" ? "ok" : e.status === "Planning" ? "warn" : "muted"}>{e.status}</Chip>
                  </div>
                  <div style={{fontWeight:700, fontSize:17}}>{e.name}</div>
                  <div className="muted" style={{fontSize:12.5, marginTop:2}}>{e.type} · {e.dates}</div>
                </div>
              </div>
              <div className="muted" style={{fontSize:12.5, lineHeight:1.5}}>{e.summary}</div>
              <div style={{display:'flex', gap:18, fontSize:12, color:'var(--text-2)', flexWrap:'wrap'}}>
                {e.subEvents.length > 0 && <span><b>{e.subEvents.length}</b> sub-events</span>}
                <span><b>{e.briefings.length}</b> briefing{e.briefings.length === 1 ? '' : 's'}</span>
                <span><b>{e.mutualAid.length}</b> mutual aid</span>
                <span>Lead: <b>{e.lead}</b></span>
              </div>
              <button className="btn btn-sm" style={{alignSelf:'flex-start'}} onClick={() => setActiveId(e.id)}><Icons.ChevronRight size={12}/> Open event</button>
            </div>
          </div>
        ))}
      </div>

      {creating && <NewEventModal onClose={() => setCreating(false)} onCreated={() => { setCreating(false); toast("Event drafted — fill briefing details next."); }}/>}
    </>
  );
}

// ── Classification banner & chip ──────────────────────────────
function ClassChip({ text, color = "amber" }) {
  const bg = color === "amber" ? "#7a4a0e" : color === "red" ? "var(--danger)" : "var(--accent)";
  return (
    <span style={{
      background: bg, color: '#fff', fontSize: 9.5, fontWeight: 800, letterSpacing: '.12em',
      padding: '2px 7px', borderRadius: 3, display: 'inline-flex', alignItems: 'center', gap: 4,
    }}>
      <Icons.Lock size={9} sw={2.4}/> {text}
    </span>
  );
}

function ClassificationBanner({ classification, caveat, color = "amber" }) {
  const bg = color === "amber" ? "linear-gradient(180deg, #7a4a0e, #5e3808)" : color === "red" ? "linear-gradient(180deg, #b3261e, #7a1a14)" : "linear-gradient(180deg, var(--accent-ink), var(--accent))";
  return (
    <div style={{
      background: bg, color: '#fff', padding: '10px 16px', borderRadius: 8, marginBottom: 14,
      display: 'flex', alignItems: 'center', gap: 12, border: '2px solid rgba(255,255,255,.15)',
    }}>
      <Icons.Lock size={16}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12, fontWeight:800, letterSpacing:'.1em', textTransform:'uppercase'}}>{classification}</div>
        {caveat && <div style={{fontSize:11.5, opacity:.85, marginTop:2}}>{caveat}</div>}
      </div>
      <span style={{fontSize:10, opacity:.7, fontFamily:'var(--font-mono)'}}>NOFORN · LES</span>
    </div>
  );
}

// ── Event detail ──────────────────────────────────────────────
function EventDetail({ id, role, onBack, onOpenBriefing }) {
  const e = SE_EVENTS.find(x => x.id === id);
  const isSup = role === "Supervisor" || role === "Command Staff" || role === "Admin";
  const toast = useToast();
  if (!e) return null;
  const totalPosts = e.subEvents.reduce((s, x) => s + x.posts, 0);
  const totalFilled = e.subEvents.reduce((s, x) => s + x.filled, 0);

  return (
    <>
      <button className="btn btn-sm btn-ghost" style={{marginBottom:12}} onClick={onBack}><Icons.ChevronLeft size={12}/> All events</button>

      {e.classification?.startsWith("Confidential") && (
        <ClassificationBanner classification={e.classification} caveat="Operational planning — RPD command + designated mutual aid command only."/>
      )}

      <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:14, marginBottom:14}}>
        <div>
          <h1 style={{margin:'0 0 4px', fontSize:26}}>{e.name}</h1>
          <div className="muted" style={{fontSize:13.5}}>{e.type} · {e.dates} · Lead: {e.lead}{e.coLead ? ` · Co-lead: ${e.coLead}` : ''}</div>
        </div>
        <div style={{display:'flex', gap:8}}>
          {isSup && <button className="btn"><Icons.FileText size={14}/> Edit details</button>}
          {isSup && <button className="btn btn-primary" onClick={() => toast("Briefing template created.")}><Icons.Plus size={14}/> Add briefing</button>}
        </div>
      </div>

      <div className="grid grid-4" style={{marginBottom:16}}>
        <Kpi label="Posts staffed" val={`${totalFilled}/${totalPosts}`} sub={totalPosts ? `${Math.round(totalFilled/totalPosts*100)}% filled` : '—'} icon={<Icons.Users size={18}/>}/>
        <Kpi label="Sub-events" val={String(e.subEvents.length)} sub="briefable segments" icon={<Icons.Calendar size={18}/>}/>
        <Kpi label="Briefings" val={String(e.briefings.length)} sub={e.briefings.length ? "tap to open" : "—"} icon={<Icons.FileText size={18}/>}/>
        <Kpi label="Expected attendance" val={e.expectedAttendance} sub={e.icsLevel || "Standard"} icon={<Icons.Activity size={18}/>}/>
      </div>

      <div className="grid grid-2-1">
        <div className="grid" style={{gridTemplateColumns:'1fr', gap:16}}>
          {e.subEvents.length > 0 && (
            <Card title="Schedule of events" meta={`${e.subEvents.length} segments`}>
              <table className="tbl">
                <thead><tr><th>Day</th><th>Time</th><th>Segment</th><th>Posts</th><th></th></tr></thead>
                <tbody>
                  {e.subEvents.map(s => (
                    <tr key={s.id} className="row-hover">
                      <td><b>{s.day}</b></td>
                      <td className="muted" style={{fontFamily:'var(--font-mono)'}}>{s.time}</td>
                      <td>{s.name}</td>
                      <td><Chip kind={s.filled === s.posts ? "ok" : s.filled >= s.posts/2 ? "warn" : "danger"}>{s.filled}/{s.posts}</Chip></td>
                      <td>{isSup && <button className="btn btn-sm btn-ghost" onClick={() => toast("Open assignment editor.")}>Assign</button>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          )}

          <Card title="Operational briefings" meta="Each briefing covers a phase or day">
            {e.briefings.length === 0 ? (
              <div className="muted" style={{padding:20, textAlign:'center'}}>No briefings yet. {isSup && "Click + Add briefing above."}</div>

                  return (
                    <div className="lst-row" key={bid}>

                    <div className="ic-wrap"><Icons.Phone size={15}/></div>

                      <div className="t2" style={{fontFamily:'var(--font-mono)'}}>{c.phone}</div>

            </Card>
          )}

          {e.assets.length > 0 && (
            <Card title="Attachments">
              <div className="lst">
                {e.assets.map((a,i) => (
                  <div className="lst-row" key={i}>
                    <div className="ic-wrap"><Icons.FileText size={15}/></div>
                    <div className="grow">
                      <div className="t1">{a.name}</div>
                      <div className="muted" style={{fontSize:11.5}}>{a.kind}</div>
                    </div>
                    <button className="btn btn-sm btn-ghost"><Icons.Download size={12}/></button>
                  </div>
                ))}
              </div>
            </Card>
          )}
        </div>
      </div>
    </>
  );
}

function ReservesHub({ role, me }) {
  const [tab, setTab] = useState("clock");
  const isReserve = role === "Reserve Officer";
  const isSecretary = isReserve && me?.id === "r4";
  const toast = useToast();

  const exportPayrollCSV = () => {
    const header = "Reserve,Badge,Period,Cert Hours,Parks Hours,Event Hours,Total Hours,Pay Rate,Gross\n";
    const rows = RESERVE_HOURS.map(r => {
      const total = (r.cert||0) + (r.parks||0) + (r.event||0);
      const rate = 18.50;
      return `"${r.name}",${r.badge||''},Apr 1 - Apr 30,${(r.cert||0).toFixed(1)},${(r.parks||0).toFixed(1)},${(r.event||0).toFixed(1)},${total.toFixed(1)},${rate.toFixed(2)},${(total*rate).toFixed(2)}`;
    }).join("\n");
    const blob = new Blob([header + rows], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "RPD-Reserve-Payroll-Apr.csv";
    a.click();
    URL.revokeObjectURL(url);
    toast("Payroll CSV exported. Submit to City Finance.");
  };

  return (
    <>
      <PageHead
        title="Reserves"
        sub="Availability, clock in/out, hours tracking, and reserve unit board."
        actions={
          <>
            <button className="btn" onClick={() => toast("YTD hours exported.")}><Icons.Download size={14}/> Export hours (YTD)</button>
            {isSecretary && (
              <button className="btn btn-primary" onClick={exportPayrollCSV}>
                <Icons.FileText size={14}/> Export payroll (Secretary)
              </button>
            )}
          </>
        }
      />
      <Tabs
        tabs={[
          { id: "clock",  label: "Clock In / Out" },
          { id: "hours",  label: "Hours" },
          { id: "avail",  label: "Availability" },
          { id: "board",  label: "Reserve Board" },
        ]}
        value={tab}
        onChange={setTab}
      />
      {tab === "clock" && <ReserveClock role={role} me={me}/>}
      {tab === "hours" && <ReserveHours role={role}/>}
      {tab === "avail" && <ReserveAvailability role={role}/>}
      {tab === "board" && <ReserveBoard/>}
    </>
  );
}

function ReserveClock({ role, me }) {
  const toast = useToast();
  const [onShift, setOnShift] = useState(false);
  const [start, setStart] = useState(null);
  const [now, setNow] = useState(new Date());
  const [cat, setCat] = useState("Certified");
  const [partner, setPartner] = useState("Sgt. Carter");
  const [loc, setLoc] = useState("City-wide");
  const [notes, setNotes] = useState("");

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const elapsed = onShift && start ? Math.floor((now - start) / 1000) : 0;
  const fmtElapsed = (s) => {
    const h = String(Math.floor(s/3600)).padStart(2,'0');
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    const sec = String(s%60).padStart(2,'0');
    return `${h}:${m}:${sec}`;
  };
  const nowStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const start_ = () => {
    setStart(new Date());
    setOnShift(true);
    toast(`Clocked in · ${cat}`);
  };
  const stop_ = () => {
    setOnShift(false);
    toast("Clocked out. Hours submitted for supervisor review.");
  };

  const reservePerson = role === "Reserve Officer" ? me : RESERVES[3];

  return (
    <div className="grid grid-2-1">
      <div style={{display:'flex', flexDirection:'column', gap:16}}>
        <div className="clock-card">
          <div>
            <div className="label">Status</div>
            <div className="status-row" style={{marginTop:8, marginBottom:14}}>
              <span className={"pulse " + (onShift ? "" : "off")}/>
              <span style={{fontSize:15, fontWeight:600}}>{onShift ? "On shift" : "Off duty"}</span>
            </div>
            <div className="label">Now</div>
            <div className="now">{onShift ? fmtElapsed(elapsed) : nowStr}</div>
            <div style={{color:'#8ea2bf', fontSize:12, marginTop:4}}>
              {onShift ? `Started ${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} · ${cat}` : new Date().toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'})}
            </div>
          </div>
          <div style={{display:'flex', flexDirection:'column', justifyContent:'flex-end'}}>
            {!onShift ? (
              <button className="btn btn-accent" style={{height:54, fontSize:15, justifyContent:'center'}} onClick={start_}>
                <Icons.PlayCircle size={20}/> Clock in
              </button>
            ) : (
              <button className="btn btn-danger" style={{height:54, fontSize:15, justifyContent:'center', background:'#fff'}} onClick={stop_}>
                <Icons.StopCircle size={20}/> Clock out
              </button>
            )}
          </div>
        </div>

        <Card title="Shift details" meta="Required to clock in">
          <div className="fieldset">
            <div className="field">
              <label>Category</label>
              <select className="select" value={cat} onChange={e => setCat(e.target.value)}>
                <option>Certified (with FT officer)</option>
                <option>Parks</option>
                <option>Special Event</option>
              </select>
              <span className="hint">Hours are tracked separately and cumulatively.</span>
            </div>
            <div className="field">
              <label>Partner officer {cat.startsWith("Certified") && <span style={{color:'var(--danger)'}}>*</span>}</label>
              <select className="select" value={partner} onChange={e => setPartner(e.target.value)} disabled={!cat.startsWith("Certified")}>
                <option>Sgt. Carter</option>
                <option>Sgt. Lopez</option>
                <option>Cpl. Brown</option>
                <option>Lt. Reyes</option>
              </select>
              <span className="hint">{cat.startsWith("Certified") ? "Required for certified hours credit." : "Not required for this category."}</span>
            </div>
            <div className="field">
              <label>Location / Post</label>
              <input className="input" value={loc} onChange={e => setLoc(e.target.value)} />
            </div>
            <div className="field">
              <label>Vehicle / unit</label>
              <select className="select" defaultValue="PD-22">
                <option>PD-11</option><option>PD-12</option><option>PD-15</option><option>PD-22</option>

            </div>

              <label>Notes</label>
              <textarea className="textarea" placeholder="Activities, traffic stops, calls assisted, etc." value={notes} onChange={e => setNotes(e.target.value)}/>
            </div>
          </div>
        </Card>

        <Card title="My recent clock entries" action={<button className="btn btn-sm btn-ghost"><Icons.History size={13}/> Full log</button>}>
          <table className="tbl">
            <thead><tr><th>Date</th><th>In</th><th>Out</th><th>Hours</th><th>Category</th><th>Partner</th><th>Location</th></tr></thead>
            <tbody>
              {RECENT_CLOCKS.map(c => (
                <tr key={c.id} className="row-hover">
                  <td>{c.date}</td>
                  <td className="num">{c.in}</td>
                  <td className="num">{c.out}</td>
                  <td className="num">{c.hrs.toFixed(1)}</td>

              ))}
            </tbody>

          <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:14}}>

              <div style={{fontWeight:600}}>{reservePerson.name}</div>
              <div className="muted" style={{fontSize:12}}>Reserve · Joined {reservePerson.joined || "—"}</div>
              <div style={{display:'flex', gap:4, marginTop:4}}>
                {(reservePerson.tags || []).map(t => <span key={t} className={"tag " + t.toLowerCase()}>{t}</span>)}

          {(() => {
            const h = RESERVE_HOURS.find(x => x.id === reservePerson.id) || RESERVE_HOURS[3];
            return (
              <div style={{display:'flex', flexDirection:'column', gap:10}}>
                <HoursRow label="Certified" val={h.certified} max={150} cls="bar-cert" />
                <HoursRow label="Parks" val={h.parks} max={100} cls="bar-parks" />

                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'1px solid var(--line-2)', paddingTop:10, marginTop:4}}>
                  <span style={{fontWeight:600}}>Total YTD</span>
                  <span className="mono" style={{fontWeight:700, fontSize:18}}>{h.total} hrs</span>
                </div>
              </div>
            );
          })()}
        </Card>

        <Card title="Tonight's coverage">
          <div className="lst">
            <div className="lst-row">
              <div className="ic-wrap"><Icons.Shield size={15}/></div>
              <div className="grow">
                <div className="t1">Sgt. Lopez (FT)</div>
                <div className="t2">Patrol Night · 18:00–06:00</div>
              </div>
            </div>
            <div className="lst-row">

          </div>

        <div className="help-banner">
          <Icons.AlertCircle size={22}/>

            <b>Tip:</b> Certified hours require a Full-Time officer as partner. Bike and ATV designations apply to Parks and Event categories.
          </div>

function ReserveAvailability({ role }) {
  const toast = useToast();
  // 7 days x 3 slots (morning/afternoon/evening)
  const slots = ["Morning", "Afternoon", "Evening"];
  const [grid, setGrid] = useState(() =>
    slots.map(() => weekDates.map(() => "—"))
  );
  const cycle = (s) => s === "—" ? "Yes" : s === "Yes" ? "Pref" : s === "Pref" ? "No" : "—";
  const cls = { "Yes":"av-yes", "No":"av-no", "Pref":"av-pref", "—":"" };
  const lbl = { "Yes":"Available", "No":"Unavailable", "Pref":"Preferred", "—":"—" };

  const [recurring, setRecurring] = useState(true);
  const isSup = role === "Supervisor" || role === "Command Staff" || role === "Admin";

  return (
    <div className="grid grid-2-1">
      <div style={{display:'flex', flexDirection:'column', gap:16}}>
        <Card title="Set my availability" meta={`Week of ${fmtDate(weekDates[0])}`}
              action={<button className="btn btn-primary btn-sm" onClick={() => toast("Availability submitted.")}>Submit availability</button>}>
          <div className="avail">
            <div className="h">&nbsp;</div>
            {weekDates.map((d, i) => (
              <div key={i} className="h">{fmtDay(d)}<br/><span style={{fontSize:13, color:'var(--text-2)'}}>{d.getDate()}</span></div>
            ))}
            {slots.map((s, si) => (
              <React.Fragment key={s}>
                <div className="row-l">{s}</div>
                {weekDates.map((_, di) => (
                  <div key={di} className={"cell " + cls[grid[si][di]]}
                       onClick={() => setGrid(g => g.map((row, i) => i === si ? row.map((c, j) => j === di ? cycle(c) : c) : row))}>
                    {lbl[grid[si][di]]}
                  </div>
                ))}
              </React.Fragment>
            ))}
          </div>
          <div style={{display:'flex', gap:14, alignItems:'center', marginTop:14, fontSize:12.5}}>
            <span className="muted">Tap cells to cycle:</span>
            <span className="chip chip-ok"><span className="dot"/>Available</span>
            <span className="chip" style={{background:'var(--accent)', color:'#fff'}}><span className="dot"/>Preferred</span>
            <span className="chip chip-danger"><span className="dot"/>Unavailable</span>
            <label style={{marginLeft:'auto', display:'inline-flex', alignItems:'center', gap:6, color:'var(--text-2)'}}>
              <input type="checkbox" checked={recurring} onChange={e => setRecurring(e.target.checked)}/> Apply weekly (recurring)
            </label>
          </div>
        </Card>

        {isSup && (
          <Card title="Reserve availability summary" meta="Supervisor view">
            <table className="tbl">
              <thead><tr><th>Day</th><th>Available</th><th>Preferred</th><th>Bike-cert</th><th>ATV-cert</th></tr></thead>

                    <td className="num">{8 + (i%4)}</td>
                    <td className="num">{2 + (i%3)}</td>
                    <td className="num">{3 + (i%3)}</td>
                    <td className="num">{2 + (i%2)}</td>
                  </tr>

            </table>

      <Card title="Notes for scheduling">

function OnCallCal({ role }) {

// ── Mobile clock-in QR ────────────────────────────────────────
function ClockQR({ role }) {
  const code = "RPD-CLOCK-2026";
  // simple svg "QR-ish" placeholder pattern
  const cells = [];
  let h = 0;
  for (let i = 0; i < code.length; i++) h = (h * 31 + code.charCodeAt(i)) >>> 0;
  for (let y = 0; y < 21; y++) for (let x = 0; x < 21; x++) {
    const v = (Math.sin((x*7 + y*13 + h) % 1000) + 1) / 2;
    if (v > 0.5) cells.push({x, y});
  }
  // finder squares
  const finders = [[0,0],[14,0],[0,14]];

  return (
    <>
      <PageHead
        title="Reserve Clock-In QR"
        sub="Post this in the briefing room. Reserves scan with their phone to clock in/out without a desktop."
        actions={<button className="btn"><Icons.Printer size={14}/> Print full-page</button>}
      />
      <div style={{display:'grid', gridTemplateColumns:'auto 1fr', gap:32, alignItems:'start'}}>
        <Card>
          <div style={{padding:24, background:'#fff', textAlign:'center'}}>
            <svg width="280" height="280" viewBox="0 0 21 21" style={{imageRendering:'pixelated'}}>
              <rect width="21" height="21" fill="#fff"/>
              {cells.map((c, i) => <rect key={i} x={c.x} y={c.y} width="1" height="1" fill="#0f1d33"/>)}
              {finders.map(([x,y], i) => (
                <g key={i}>
                  <rect x={x} y={y} width="7" height="7" fill="#fff"/>
                  <rect x={x} y={y} width="7" height="7" fill="none" stroke="#0f1d33" strokeWidth="1"/>
                  <rect x={x+2} y={y+2} width="3" height="3" fill="#0f1d33"/>
                </g>
              ))}
            </svg>
            <div style={{marginTop:12, fontFamily:'var(--font-mono)', fontSize:12, color:'var(--muted)'}}>{code}</div>
          </div>
        </Card>
        <div>
          <Card title="How it works">
            <ol style={{margin:0, paddingLeft:18, lineHeight:1.8}}>
              <li>Scan with your phone camera.</li>
              <li>Authenticate with your reserve PIN.</li>
              <li>Pick category (Certified / Parks / Event), partner officer, location.</li>
              <li>Tap <b>Clock In</b>. Repeat to clock out at end of shift.</li>
            </ol>
            <div className="muted" style={{fontSize:12, marginTop:14}}>
              Code rotates monthly. Print a fresh copy from this page each month and post in the briefing room.
            </div>
          </Card>
          <div style={{height:14}}/>
          <Card title="Notes">
            <ul style={{margin:0, paddingLeft:18, lineHeight:1.8}}>
              <li>Same hours-tracking as desktop clock-in.</li>
              <li>Falls back to desktop if no signal in the building.</li>
              <li>Requires reserve account on file with HR.</li>
            </ul>
          </Card>
        </div>
      </div>
    </>
  );
}

// ── Collapsible nav state (localStorage-persisted) ──────────
function useNavState() {
  const [collapsed, setCollapsed] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('rpd_nav_collapsed') || '[]')); }
    catch { return new Set(); }
  });
  const [pinned, setPinned] = useState(() => {
    try {
      const v = JSON.parse(localStorage.getItem('rpd_nav_pinned') || 'null');
      return v || ['dashboard','schedule','open','callback','passdown'];
    } catch { return ['dashboard','schedule','open','callback','passdown']; }
  });
  const toggleGroup = (label) => {
    setCollapsed(s => {
      const n = new Set(s);
      if (n.has(label)) n.delete(label); else n.add(label);
      localStorage.setItem('rpd_nav_collapsed', JSON.stringify([...n]));
      return n;
    });
  };
  const togglePin = (id) => {
    setPinned(arr => {
      const n = arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id];
      localStorage.setItem('rpd_nav_pinned', JSON.stringify(n));
      return n;
    });
  };
  return { collapsed, toggleGroup, pinned, togglePin };
}

// ── Command palette ─────────────────────────────────────────
function CommandPalette({ open, onClose, onPick }) {
  const [q, setQ] = useState('');
  const inputRef = useRef(null);
  useEffect(() => {
    if (open) {
      setQ('');
      setTimeout(() => inputRef.current?.focus(), 30);
    }
  }, [open]);

  if (!open) return null;
  const ql = q.trim().toLowerCase();
  const results = NAV.filter(n =>
    !ql || n.label.toLowerCase().includes(ql) || n.id.includes(ql)
  ).slice(0, 12);

  return (
    <div className="modal-bg" onClick={onClose} style={{alignItems:'flex-start', paddingTop:'12vh'}}>
      <div onClick={e => e.stopPropagation()} style={{
        width: 540, maxWidth: '92vw', background: 'var(--surface)',
        borderRadius: 12, boxShadow: '0 20px 60px rgba(0,0,0,.4)',
        border: '1px solid var(--line)', overflow: 'hidden',
      }}>
        <div style={{display:'flex', alignItems:'center', gap:10, padding:'12px 14px', borderBottom:'1px solid var(--line)'}}>
          <Icons.Search size={16}/>
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Escape') onClose();
              if (e.key === 'Enter' && results[0]) { onPick(results[0].id); onClose(); }
            }}
            placeholder="Jump to screen…  (Esc to close)"
            style={{
              flex:1, border:'none', outline:'none', background:'transparent',
              fontSize: 15, color: 'var(--text-1)', fontFamily:'inherit',
            }}
          />
          <span className="muted" style={{fontSize:11, fontFamily:'var(--font-mono)'}}>↵ go</span>
        </div>
        <div style={{maxHeight:'50vh', overflowY:'auto', padding:'6px 0'}}>
          {results.length === 0 && <div className="muted" style={{padding:20, textAlign:'center', fontSize:13}}>No matches</div>}
          {results.map(n => {
            const Icon = Icons[n.icon] || Icons.Star;
            return (
              <button
                key={n.id}
                onClick={() => { onPick(n.id); onClose(); }}
                style={{
                  display:'flex', alignItems:'center', gap:12, padding:'10px 14px',
                  width:'100%', border:'none', background:'transparent', cursor:'pointer',
                  color:'var(--text-1)', fontSize:14, textAlign:'left',
                }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--surface-2)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
              >
                <Icon size={16}/>
                <span style={{flex:1}}>{n.label}</span>
                <span className="muted" style={{fontSize:11, fontFamily:'var(--font-mono)'}}>{n.id}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const [unlocked, setUnlocked] = React.useState(() => sessionStorage.getItem('rpd_demo_unlocked') === '1');
  const [pin, setPin] = React.useState('');
  const [err, setErr] = React.useState(false);
  const inputRef = React.useRef(null);
  React.useEffect(() => { if (!unlocked) inputRef.current?.focus(); }, [unlocked]);

  if (unlocked) return children;

  const submit = (e) => {
    e?.preventDefault();
    if (pin.trim().toUpperCase() === DEMO_PIN) {
      sessionStorage.setItem('rpd_demo_unlocked', '1');
      setUnlocked(true);
    } else {
      setErr(true);
      setPin('');
      setTimeout(() => setErr(false), 600);
    }
  };

  return (
    <div className="pin-gate">
      <form className={"pin-card" + (err ? " shake" : "")} onSubmit={submit}>
        <svg width="44" height="50" viewBox="0 0 32 36" fill="none" aria-hidden="true" style={{margin:'0 auto 14px'}}>
          <path d="M16 1 L29 5 V17 C29 25 23 31 16 34 C9 31 3 25 3 17 V5 Z" fill="#0f1d33" stroke="#6ea6ff" strokeWidth="1.4"/>
          <path d="M16 8 L24 11 V17 C24 22 20.5 25.5 16 27 C11.5 25.5 8 22 8 17 V11 Z" fill="none" stroke="#6ea6ff" strokeWidth="1" opacity="0.7"/>
          <text x="16" y="20" textAnchor="middle" fontFamily="Inter, system-ui" fontSize="9" fontWeight="700" fill="#fff" letterSpacing="0.5">RPD</text>
        </svg>
        <h1>Richmond PD · Internal Ops</h1>
        <p className="sub">Enter demo PIN to continue</p>
        <input
          ref={inputRef}
          type="password"
          inputMode="text"
          autoComplete="off"
          spellCheck={false}
          maxLength={12}
          value={pin}
          onChange={(e) => { setPin(e.target.value); if (err) setErr(false); }}
          aria-label="Demo PIN"
          placeholder="••••"
        />
        {err && <div className="pin-err">Incorrect PIN</div>}
        <button type="submit" className="btn btn-primary" style={{width:'100%', justifyContent:'center', marginTop:14}}>
          Continue
        </button>
        <p className="pin-foot">Demo build · mock data only · not for live operations</p>
      </form>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PinGate><App/></PinGate>);

  </script>
</body>
</html>
